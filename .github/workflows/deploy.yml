name: Deploy Backend
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean install -DskipTests -B

      - name: Unpack jar
        run: |
          mkdir -p target/dependency
          cd target/dependency
          jar -xf ../*.jar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: hbd0214/234-deploylab-backend:latest

      - name: Save Docker image to tar
        run: |
          docker pull hbd0214/234-deploylab-backend:latest
          docker save hbd0214/234-deploylab-backend:latest -o backend-image.tar
          chmod 666 backend-image.tar

      - name: Copy image and docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: root
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          source: "backend-image.tar,docker-compose.yml"
          target: "/root/backend"

      - name: Load image and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST_SERVER }}
          username: root
          key: ${{ secrets.HOST_SSH_PRIVATE_KEY }}
          script: |
            cd /root/backend
            docker load -i backend-image.tar
            docker-compose down || true
            docker-compose up -d
            rm -f backend-image.tar